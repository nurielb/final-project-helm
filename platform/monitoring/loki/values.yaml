loki:
  deploymentMode: SingleBinary

  chunksCache:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 256Mi
  
  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      bucketNames:
        chunks: dummy
        ruler: dummy
        admin: dummy

    storage_config:
      filesystem:
        directory: /var/loki/chunks

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi

  write:
    replicas: 0

  read:
    replicas: 0

  backend:
    replicas: 0