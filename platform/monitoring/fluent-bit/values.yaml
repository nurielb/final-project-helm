kind: DaemonSet

fluent-bit:

  config:
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          Tag kube.*
          multiline.parser docker, cri

    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Kube_Tag_Prefix kube.var.log.containers.
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude Off

    outputs: |
      [OUTPUT]
          Name loki
          Match kube.*
          Host loki-gateway.monitoring
          Port 80